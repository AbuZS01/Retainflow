services:
  - type: web
    name: muraja-ah
    runtime: docker
    dockerfilePath: ./Dockerfile
    disk:
      name: muraja-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/muraja.db
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        sync: false   # set manually after first deploy
      - key: CANONICAL_HOST
        sync: false   # e.g. murajah.app — enables 301 of stray hosts
      - key: APP_URL
        sync: false   # https://murajah.app — Stripe redirect base
      # Litestream → Cloudflare R2 (set all four to enable backups)
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: LITESTREAM_ACCESS_KEY_ID
        sync: false
      - key: LITESTREAM_SECRET_ACCESS_KEY
        sync: false
      # Stripe (set all three to enable Lifetime Premium)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
